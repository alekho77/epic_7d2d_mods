name: Package Mods

on:
  push:
    tags:
      # Repo-wide release (all mods)
      - "v*"
      # Per-mod release, e.g. EV_EpicCash-v1.2.1
      - "EV_*-v*"
  workflow_dispatch:
    inputs:
      mods:
        description: "Comma-separated mod folder names (empty = all)"
        required: false
        default: ""

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Resolve release metadata
        id: meta
        run: |
          TAG=""
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          # Default release name mirrors the tag; refined below for single-mod tags.
          RELEASE_NAME="${TAG:-Manual build}"
          if [[ "${TAG}" =~ ^(EV_[A-Za-z0-9_]+)-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            MOD="${BASH_REMATCH[1]}"
            VER="${BASH_REMATCH[2]}"
            RELEASE_NAME="${MOD} v${VER}"
          fi
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Package mods
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.mods }}" ]; then
            ARGS="--mods ${{ github.event.inputs.mods }}"
          elif [ -n "${{ steps.meta.outputs.tag }}" ]; then
            ARGS="--tag ${{ steps.meta.outputs.tag }}"
          fi
          python scripts/package_mods.py $ARGS

      - name: Build release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python scripts/build_release_notes.py \
            --manifest dist/manifest.json \
            --output   dist/RELEASE_NOTES.md \
            --tag      "${{ steps.meta.outputs.tag }}"
          echo "----- RELEASE_NOTES.md -----"
          cat dist/RELEASE_NOTES.md

      - name: Upload individual mod artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mod-archives
          path: dist/*.zip
          if-no-files-found: error

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: dist/manifest.json

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.meta.outputs.release_name }}
          body_path: dist/RELEASE_NOTES.md
          files: dist/*.zip
          fail_on_unmatched_files: true
